apiVersion: v1
kind: Secret
metadata:
  name: hostel-secrets
  namespace: smart-hostel
type: Opaque
data:
  # Replace with: echo -n "your-jwt-secret" | base64
  JWT_SECRET: cGxhY2Vob2xkZXItdmFsdWU=
  # Replace with: echo -n "mongodb://mongo:27017/hostelDB" | base64
  MONGO_URI: bW9uZ29kYjovL21vbmdvOjI3MDE3L2hvc3RlbERC
  # Replace with: echo -n "hostel_ingest" | base64
  MQTT_USER: aG9zdGVsX2luZ2VzdA==
  # Replace with: echo -n "your-mqtt-password" | base64
  MQTT_PASS: cGxhY2Vob2xkZXItdmFsdWU=
  # Replace with: echo -n "http://localhost:3000" | base64
  ALLOWED_ORIGINS: aHR0cDovL2xvY2FsaG9zdDozMDAw

---
apiVersion: v1
kind: Secret
metadata:
  name: mosquitto-passwd
  namespace: smart-hostel
type: Opaque
data:
  # Replace with: echo -n "hostel_ingest:your-mqtt-password" | base64
  passwd: aG9zdGVsX2luZ2VzdDpwbGFjZWhvbGRlci12YWx1ZQ==
