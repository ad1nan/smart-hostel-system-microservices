apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: smart-hostel
  labels:
    app: analytics
  annotations:
    kubernetes.io/description: "Single replica only — MQTT publishers/subscribers must not be horizontally scaled without a distributed lock or message deduplication layer. Multiple analytics replicas will cause duplicate alert insertions."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
      - name: analytics
        image: smart-hostel-analytics:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5004
          name: analytics
        envFrom:
        - configMapRef:
            name: hostel-config
        - secretRef:
            name: hostel-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
