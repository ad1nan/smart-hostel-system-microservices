apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smart-hostel
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: smart-hostel-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
          name: api-gateway
        envFrom:
        - configMapRef:
            name: hostel-config
        - secretRef:
            name: hostel-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
