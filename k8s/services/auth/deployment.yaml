apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: smart-hostel
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: smart-hostel-auth:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5005
          name: auth
        envFrom:
        - configMapRef:
            name: hostel-config
        - secretRef:
            name: hostel-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
